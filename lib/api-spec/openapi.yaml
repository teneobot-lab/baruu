openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GudangPro Inventory Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: inventory
    description: Inventory management
  - name: transactions
    description: Transaction management
  - name: reject
    description: Reject module
  - name: music
    description: Music player
  - name: dashboard
    description: Dashboard & analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/low-stock:
    get:
      operationId: getLowStockItems
      tags: [dashboard]
      summary: Get items with low stock
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockItem"

  /dashboard/recent-transactions:
    get:
      operationId: getRecentTransactions
      tags: [dashboard]
      summary: Get recent transactions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionSummary"

  /dashboard/stock-by-warehouse:
    get:
      operationId: getStockByWarehouse
      tags: [dashboard]
      summary: Get stock grouped by warehouse
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WarehouseStockSummary"

  /dashboard/transaction-trend:
    get:
      operationId: getTransactionTrend
      tags: [dashboard]
      summary: Get transaction counts per day for last 30 days
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionTrendPoint"

  # ─── ITEMS ───────────────────────────────────────────────────────────────────
  /inventory/items:
    get:
      operationId: getItems
      tags: [inventory]
      summary: List all items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: upsertItem
      tags: [inventory]
      summary: Create or update an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /inventory/items/{id}:
    get:
      operationId: getItem
      tags: [inventory]
      summary: Get item by ID with stock card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetail"
    delete:
      operationId: deleteItem
      tags: [inventory]
      summary: Soft delete item (set inactive)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /inventory/items/bulk-delete:
    post:
      operationId: bulkDeleteItems
      tags: [inventory]
      summary: Soft delete multiple items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteInput"
      responses:
        "200":
          description: OK

  # ─── WAREHOUSES ──────────────────────────────────────────────────────────────
  /inventory/warehouses:
    get:
      operationId: getWarehouses
      tags: [inventory]
      summary: List all warehouses
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      operationId: upsertWarehouse
      tags: [inventory]
      summary: Create or update a warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  /inventory/warehouses/{id}:
    delete:
      operationId: deleteWarehouse
      tags: [inventory]
      summary: Delete warehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  # ─── PARTNERS ────────────────────────────────────────────────────────────────
  /inventory/partners:
    get:
      operationId: getPartners
      tags: [inventory]
      summary: List all partners
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [SUPPLIER, CUSTOMER]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"
    post:
      operationId: upsertPartner
      tags: [inventory]
      summary: Create or update a partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  /inventory/partners/{id}:
    delete:
      operationId: deletePartner
      tags: [inventory]
      summary: Delete partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  # ─── USERS ───────────────────────────────────────────────────────────────────
  /inventory/users:
    get:
      operationId: getUsers
      tags: [inventory]
      summary: List all users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"
    post:
      operationId: upsertUser
      tags: [inventory]
      summary: Create or update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /inventory/users/{id}:
    delete:
      operationId: deleteUser
      tags: [inventory]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  # ─── STOCK ───────────────────────────────────────────────────────────────────
  /inventory/stocks:
    get:
      operationId: getStocks
      tags: [inventory]
      summary: Get all stock records (qty per item per warehouse)
      parameters:
        - name: warehouseId
          in: query
          schema:
            type: string
        - name: itemId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockRecord"

  # ─── SYSTEM CONFIG ───────────────────────────────────────────────────────────
  /inventory/config:
    post:
      operationId: setConfig
      tags: [inventory]
      summary: Save a system setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigInput"
      responses:
        "200":
          description: OK

  /inventory/config/{key}:
    get:
      operationId: getConfig
      tags: [inventory]
      summary: Get a system setting by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRecord"

  # ─── TRANSACTIONS ─────────────────────────────────────────────────────────────
  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: List transactions with filters
      parameters:
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
        - name: warehouseId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [IN, OUT, TRANSFER, ADJUSTMENT]
        - name: itemId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction and update stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    put:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update transaction (revert old stock, apply new)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: removeTransaction
      tags: [transactions]
      summary: Delete transaction and revert stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  # ─── REJECT ──────────────────────────────────────────────────────────────────
  /reject/outlets:
    get:
      operationId: getRejectOutlets
      tags: [reject]
      summary: List reject outlets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RejectOutlet"
    post:
      operationId: createRejectOutlet
      tags: [reject]
      summary: Create reject outlet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectOutletInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectOutlet"

  /reject/master-items:
    get:
      operationId: getRejectMasterItems
      tags: [reject]
      summary: List reject master items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RejectMasterItem"
    post:
      operationId: upsertRejectMasterItem
      tags: [reject]
      summary: Create or update reject master item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectMasterItemInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectMasterItem"

  /reject/master-items/{id}:
    delete:
      operationId: deleteRejectMasterItem
      tags: [reject]
      summary: Delete reject master item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /reject/batches:
    get:
      operationId: getRejectBatches
      tags: [reject]
      summary: List reject batches
      parameters:
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
        - name: outlet
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RejectBatch"
    post:
      operationId: createRejectBatch
      tags: [reject]
      summary: Create a reject batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectBatchInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectBatch"

  /reject/batches/{id}:
    delete:
      operationId: deleteRejectBatch
      tags: [reject]
      summary: Delete reject batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  # ─── MUSIC ───────────────────────────────────────────────────────────────────
  /music/playlists:
    get:
      operationId: getPlaylists
      tags: [music]
      summary: List all playlists with songs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playlist"
    post:
      operationId: createPlaylist
      tags: [music]
      summary: Create playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"

  /music/playlists/{id}:
    delete:
      operationId: deletePlaylist
      tags: [music]
      summary: Delete playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /music/playlists/{id}/songs:
    post:
      operationId: addSong
      tags: [music]
      summary: Add song to playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /music/songs/{id}:
    delete:
      operationId: deleteSong
      tags: [music]
      summary: Delete song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── AUTH ──────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthSession:
      type: object
      required: [id, username, fullName, role]
      properties:
        id:
          type: string
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, STAFF]

    # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalItems, totalWarehouses, totalPartners, totalTransactionsToday, totalInToday, totalOutToday, lowStockCount]
      properties:
        totalItems:
          type: integer
        totalWarehouses:
          type: integer
        totalPartners:
          type: integer
        totalTransactionsToday:
          type: integer
        totalInToday:
          type: integer
        totalOutToday:
          type: integer
        lowStockCount:
          type: integer

    LowStockItem:
      type: object
      required: [id, code, name, baseUnit, minStock]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        baseUnit:
          type: string
        minStock:
          type: number
        currentStock:
          type: number

    TransactionSummary:
      type: object
      required: [id, referenceNo, type, date, warehouseName]
      properties:
        id:
          type: string
        referenceNo:
          type: string
        type:
          type: string
          enum: [IN, OUT, TRANSFER, ADJUSTMENT]
        date:
          type: string
        warehouseName:
          type: string
        partnerName:
          type: ["string", "null"]
        itemCount:
          type: integer

    WarehouseStockSummary:
      type: object
      required: [warehouseId, warehouseName, totalItems, totalQty]
      properties:
        warehouseId:
          type: string
        warehouseName:
          type: string
        totalItems:
          type: integer
        totalQty:
          type: number

    TransactionTrendPoint:
      type: object
      required: [date, inCount, outCount]
      properties:
        date:
          type: string
        inCount:
          type: integer
        outCount:
          type: integer

    # ─── UNIT CONVERSION ───────────────────────────────────────────────────────
    UnitConversion:
      type: object
      required: [unitName, conversionRatio, operator]
      properties:
        unitName:
          type: string
        conversionRatio:
          type: number
        operator:
          type: string
          enum: ["*", "/"]

    # ─── ITEM ──────────────────────────────────────────────────────────────────
    Item:
      type: object
      required: [id, code, name, category, baseUnit, minStock, isActive, conversions]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        baseUnit:
          type: string
        minStock:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
        conversions:
          type: array
          items:
            $ref: "#/components/schemas/UnitConversion"

    ItemDetail:
      type: object
      required: [id, code, name, category, baseUnit, minStock, isActive, conversions, stockByWarehouse]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        baseUnit:
          type: string
        minStock:
          type: number
        isActive:
          type: boolean
        conversions:
          type: array
          items:
            $ref: "#/components/schemas/UnitConversion"
        stockByWarehouse:
          type: array
          items:
            $ref: "#/components/schemas/StockRecord"
        recentMutations:
          type: array
          items:
            $ref: "#/components/schemas/TransactionSummary"

    ItemInput:
      type: object
      required: [code, name, baseUnit]
      properties:
        id:
          type: ["string", "null"]
        code:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        baseUnit:
          type: string
        minStock:
          type: number
        isActive:
          type: boolean
        conversions:
          type: array
          items:
            $ref: "#/components/schemas/UnitConversion"

    BulkDeleteInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string

    # ─── WAREHOUSE ─────────────────────────────────────────────────────────────
    Warehouse:
      type: object
      required: [id, name, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: ["string", "null"]
        pic:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean

    WarehouseInput:
      type: object
      required: [name]
      properties:
        id:
          type: ["string", "null"]
        name:
          type: string
        location:
          type: ["string", "null"]
        pic:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean

    # ─── PARTNER ───────────────────────────────────────────────────────────────
    Partner:
      type: object
      required: [id, type, name]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [SUPPLIER, CUSTOMER]
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        npwp:
          type: ["string", "null"]
        termDays:
          type: ["integer", "null"]

    PartnerInput:
      type: object
      required: [type, name]
      properties:
        id:
          type: ["string", "null"]
        type:
          type: string
          enum: [SUPPLIER, CUSTOMER]
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        npwp:
          type: ["string", "null"]
        termDays:
          type: ["integer", "null"]

    # ─── USER ──────────────────────────────────────────────────────────────────
    AppUser:
      type: object
      required: [id, username, fullName, role, status]
      properties:
        id:
          type: string
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, STAFF]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, fullName, role]
      properties:
        id:
          type: ["string", "null"]
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, STAFF]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        password:
          type: ["string", "null"]

    # ─── STOCK ─────────────────────────────────────────────────────────────────
    StockRecord:
      type: object
      required: [warehouseId, warehouseName, itemId, qty]
      properties:
        warehouseId:
          type: string
        warehouseName:
          type: string
        itemId:
          type: string
        itemName:
          type: string
        itemCode:
          type: string
        qty:
          type: number
        lastUpdated:
          type: string

    # ─── SYSTEM CONFIG ─────────────────────────────────────────────────────────
    ConfigInput:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string

    ConfigRecord:
      type: object
